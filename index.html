    <!-- SCHEMA FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Qu'est-ce qu'un titre-service ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le titre-service est un moyen de paiement subventionne par la Region qui vous permet de beneficier d'une aide-menagere agreee a un tarif avantageux. Chaque titre correspond a une heure de prestation. Vous pouvez les commander en format papier ou electronique via Pluxee (anciennement Sodexo)."
          }
        },
        {
          "@type": "Question",
          "name": "Comment commander des titres-services ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Vous devez d'abord vous inscrire aupres de Pluxee via le site de votre Region. En Wallonie, rendez-vous sur le portail Pluxee Wallonie. Une fois inscrit(e), vous pouvez commander vos titres en ligne ou par virement. Le quota annuel est de 500 titres par personne."
          }
        },
        {
          "@type": "Question",
          "name": "Quel est le prix d'un titre-service ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En Wallonie, le prix est de 10€ par titre-service. Grace a l'avantage fiscal, vous recuperez jusqu'a 1,80€ par titre, ce qui ramene le cout reel a environ 8,20€ de l'heure. A Bruxelles, le prix est de 9€ avec un avantage fiscal similaire."
          }
        },
        {
          "@type": "Question",
          "name": "Titres papier ou electroniques, quelle difference ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Les titres papier doivent etre remis physiquement a votre aide-menagere a chaque visite. Les titres electroniques (e-titres) sont plus pratiques : ils sont debites automatiquement apres chaque prestation. Nous recommandons le format electronique pour simplifier vos demarches."
          }
        },
        {
          "@type": "Question",
          "name": "Quels services sont couverts par les titres-services ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Les titres-services couvrent le menage a domicile (aspirateur, nettoyage, vaisselle, rangement...), le repassage en atelier ou a domicile, les courses menageres et la preparation de repas. Le transport de personnes a mobilite reduite est egalement couvert."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne le repassage en atelier ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Deposez votre linge propre et sec dans l'une de nos agences (Courcelles, Mont-sur-Marchienne ou Lobbes) du lundi au samedi. Nos repasseuses professionnelles s'en occupent et vous le recuperez sous 48h, plie ou sur cintres selon vos preferences. 1 titre-service = 1h de repassage."
          }
        },
        {
          "@type": "Question",
          "name": "Puis-je choisir mon aide-menagere ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nous attribuons une aide-menagere fixe a chaque client pour garantir un service personnalise et de confiance. Si le courant ne passe pas, vous pouvez demander un changement et nous trouverons une personne plus adaptee a vos attentes."
          }
        },
        {
          "@type": "Question",
          "name": "Quelles sont les zones desservies ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nous intervenons dans la region de Charleroi et ses environs, via nos agences de Courcelles, Mont-sur-Marchienne et Lobbes. Contactez-nous pour verifier que votre adresse est bien dans notre zone de couverture."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne la facturation avec les titres-services ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chaque heure de prestation correspond a un titre-service. Vous recevez une facture mensuelle recapitulant les prestations effectuees. Le montant a payer est la difference entre le cout total et la valeur des titres-services que vous avez fournis."
          }
        },
        {
          "@type": "Question",
          "name": "Quand dois-je payer mes factures ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Les factures sont envoyees mensuellement et doivent etre reglees dans un delai de 15 jours a reception. Vous pouvez payer par virement bancaire. Les titres-services (papier ou electroniques) doivent etre remis a l'aide-menagere a chaque prestation."
          }
        },
        {
          "@type": "Question",
          "name": "Que se passe-t-il si je n'ai plus de titres-services disponibles ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Si vous avez epuise votre quota annuel de titres-services, les heures supplementaires seront facturees au tarif complementaire. Nous vous informerons a l'avance si vous approchez de votre limite pour eviter toute surprise."
          }
        },
        {
          "@type": "Question",
          "name": "Quel est l'avantage fiscal des titres-services ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En Wallonie, vous beneficiez d'une deduction fiscale de 1,80€ par titre (sur les 150 premiers titres). A Bruxelles, l'avantage est de 1,35€ par titre. Ces montants sont automatiquement pris en compte lors de votre declaration fiscale annuelle."
          }
        },
        {
          "@type": "Question",
          "name": "Que se passe-t-il si mon aide-menagere est malade ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En cas de maladie de votre aide-menagere, nous vous proposons systematiquement un remplacement. Notre equipe d'encadrantes organise la substitution le plus rapidement possible pour que votre prestation soit maintenue."
          }
        },
        {
          "@type": "Question",
          "name": "Le remplacement est-il garanti ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, le remplacement est garanti. C'est l'un de nos engagements qualite. Si, dans de rares cas, aucun remplacement n'est possible le jour meme, nous reprogrammons la prestation dans les meilleurs delais sans frais supplementaires."
          }
        },
        {
          "@type": "Question",
          "name": "La remplacante connaitra-t-elle mes preferences ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nous transmettons a la remplacante toutes vos consignes et preferences enregistrees dans votre dossier (produits a utiliser, zones prioritaires, habitudes de rangement). Cela permet d'assurer une continuite de service optimale."
          }
        },
        {
          "@type": "Question",
          "name": "Comment suis-je prevenu(e) du remplacement ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Vous etes contacte(e) par telephone ou WhatsApp des que nous sommes informes de l'absence de votre aide-menagere. Nous vous communiquons le nom de la remplacante et confirmons l'horaire de la prestation."
          }
        }
      ]
    }
